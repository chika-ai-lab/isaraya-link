<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Background pill -->
  <rect width="200" height="60" rx="12" fill="#0E2043"/>

  <!-- Chain link icon -->
  <g transform="translate(14, 14)">
    <!-- Left ring -->
    <path d="M10 16 C10 11.6 13.6 8 18 8 L22 8 C26.4 8 30 11.6 30 16 C30 20.4 26.4 24 22 24 L20 24"
          stroke="#F58C45" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Right ring -->
    <path d="M22 16 C22 11.6 25.6 8 30 8 L34 8 C38.4 8 42 11.6 42 16 C42 20.4 38.4 24 34 24 L30 24"
          stroke="#3A6FF7" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Connecting bar -->
    <line x1="18" y1="16" x2="34" y2="16" stroke="#F58C45" stroke-width="2" stroke-dasharray="2 2" opacity="0.5"/>
  </g>

  <!-- STS text -->
  <text x="70" y="38" font-family="'Segoe UI', Arial, sans-serif" font-weight="800"
        font-size="24" letter-spacing="1" fill="#FFFFFF">STS</text>

  <!-- Link text -->
  <text x="116" y="38" font-family="'Segoe UI', Arial, sans-serif" font-weight="400"
        font-size="24" letter-spacing="0.5" fill="#F58C45">Link</text>

  <!-- Accent dot -->
  <circle cx="63" cy="34" r="3" fill="#F58C45"/>
</svg>
